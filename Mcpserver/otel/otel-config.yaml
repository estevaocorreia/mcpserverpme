receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318   # logs do Serilog.Sinks.OpenTelemetry vêm aqui

processors:
  batch:
    timeout: 5s

exporters:
  # Métricas e traces → Prometheus (já existente na VM)
  prometheus:
    endpoint: "0.0.0.0:8889"

  # Logs → Loki (via Grafana, se quiser visualizar logs também)
  # Se não tiver Loki, deixe só o debug por enquanto
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]